<script>
// existing script content is already present earlier in file; we append override functions to add select-based admin partite editor
(function(){
  function getGKey(){ return 'g'+(window.currentGiornataAdmin||1); }
  function teamListForG(gKey){
    const matches = (window.PARTITE_MONDIALE && window.PARTITE_MONDIALE[gKey]) || (window.partite && window.partite[gKey]) || {};
    const names = new Set();
    Object.values(matches).forEach(m=>{ if(m && m.h) names.add(m.h); if(m && m.a) names.add(m.a); });
    return Array.from(names).sort();
  }
  function makeSelect(name, value){
    const sel = document.createElement('select');
    sel.className='extra-select';
    sel.name=name;
    const gKey = getGKey();
    const teams = teamListForG(gKey);
    const placeholder = document.createElement('option');
    placeholder.value=''; placeholder.textContent='— Seleziona —';
    sel.appendChild(placeholder);
    teams.forEach(t=>{
      const opt = document.createElement('option'); opt.value=t; opt.text=t; if(t===value) opt.selected=true; sel.appendChild(opt);
    });
    return sel;
  }
  let adminRowId=0;
  // Override addPartita to use selects
  window.addPartita = function(){
    const editor = document.getElementById('partite-editor');
    if(!editor) return;
    adminRowId++;
    const row = document.createElement('div'); row.className='match-card'; row.dataset.row=adminRowId;
    const info = document.createElement('div'); info.className='match-info'; info.textContent = '';

    const teamsDiv = document.createElement('div'); teamsDiv.className='match-teams';
    const leftDiv = document.createElement('div'); leftDiv.className='team';
    const homeSel = makeSelect('h',''); homeSel.id='admin_h_'+adminRowId; leftDiv.appendChild(homeSel);
    const vsDiv = document.createElement('div'); vsDiv.className='vs'; vsDiv.textContent='VS';
    const rightDiv = document.createElement('div'); rightDiv.className='team right';
    const awaySel = makeSelect('a',''); awaySel.id='admin_a_'+adminRowId; rightDiv.appendChild(awaySel);
    teamsDiv.appendChild(leftDiv); teamsDiv.appendChild(vsDiv); teamsDiv.appendChild(rightDiv);

    const controls = document.createElement('div'); controls.style.marginTop='8px';
    const rmbtn = document.createElement('button'); rmbtn.className='btn btn-sm'; rmbtn.type='button'; rmbtn.textContent='✕ Rimuovi';
    rmbtn.onclick = ()=>{ if(editor.contains(row)) editor.removeChild(row); };
    controls.appendChild(rmbtn);

    row.appendChild(info); row.appendChild(teamsDiv); row.appendChild(controls);
    editor.appendChild(row);
  };

  // Render editor: existing partite -> rows with selects
  window.renderPartiteEditor = function(){
    const editor = document.getElementById('partite-editor');
    if(!editor) return;
    editor.innerHTML=''; adminRowId=0;
    const gKey = getGKey();
    const existing = (window.partite && window.partite[gKey]) || (window.PARTITE_MONDIALE && window.PARTITE_MONDIALE[gKey]) || {};
    const keys = Object.keys(existing);
    if(keys.length){
      keys.forEach(k=>{
        const m = existing[k]||{};
        adminRowId++;
        const row = document.createElement('div'); row.className='match-card'; row.dataset.row=adminRowId;
        const info = document.createElement('div'); info.className='match-info'; info.textContent = (m.gruppo||'') + (m.data?(' · '+m.data):'');
        const teamsDiv = document.createElement('div'); teamsDiv.className='match-teams';
        const leftDiv = document.createElement('div'); leftDiv.className='team';
        const homeSel = makeSelect('h', m.h||''); homeSel.id='admin_h_'+adminRowId; leftDiv.appendChild(homeSel);
        const vsDiv = document.createElement('div'); vsDiv.className='vs'; vsDiv.textContent='VS';
        const rightDiv = document.createElement('div'); rightDiv.className='team right';
        const awaySel = makeSelect('a', m.a||''); awaySel.id='admin_a_'+adminRowId; rightDiv.appendChild(awaySel);
        teamsDiv.appendChild(leftDiv); teamsDiv.appendChild(vsDiv); teamsDiv.appendChild(rightDiv);
        const controls = document.createElement('div'); controls.style.marginTop='8px';
        const rmbtn = document.createElement('button'); rmbtn.className='btn btn-sm'; rmbtn.type='button'; rmbtn.textContent='✕ Rimuovi';
        rmbtn.onclick = ()=>{ if(editor.contains(row)) editor.removeChild(row); };
        controls.appendChild(rmbtn);
        row.appendChild(info); row.appendChild(teamsDiv); row.appendChild(controls);
        editor.appendChild(row);
      });
    } else {
      // No existing -> create one empty row
      window.addPartita();
    }
  };

  // Override giornata change for admin to re-render editor
  window.changeGiornataAdmin = function(d){
    const max = (window.config && window.config.giornate) || 6;
    window.currentGiornataAdmin = Math.max(1, Math.min(max, (window.currentGiornataAdmin||1) + d));
    const label = document.getElementById('admin-giornata-label'); if(label) label.textContent = 'Giornata '+window.currentGiornataAdmin;
    // render editor for new giornata
    setTimeout(()=>{ renderPartiteEditor(); }, 10);
  };

  // Override savePartite to collect selects and save to Firebase
  window.savePartite = async function(){
    const gKey = 'g'+(window.currentGiornataAdmin||1);
    const editor = document.getElementById('partite-editor'); if(!editor) return;
    const rows = editor.querySelectorAll('.match-card');
    const data = {};
    let idx=1;
    rows.forEach(r=>{
      const h = r.querySelector('select[id^="admin_h_"]')?.value || '';
      const a = r.querySelector('select[id^="admin_a_"]')?.value || '';
      if(!h || !a) return;
      const key = 'm'+String(idx).padStart(2,'0');
      data[key] = { h, a, gruppo:'', data:'' };
      idx++;
    });
    try{
      await fbSet('/partite/'+gKey, data);
      window.partite = window.partite || {};
      window.partite[gKey] = data;
      if(typeof showMsg === 'function') showMsg('partite-msg','✅ Partite salvate','ok',3000);
    }catch(e){ if(typeof showMsg === 'function') showMsg('partite-msg','❌ Errore salvataggio','err',4000); }
  };

  // Initialize when admin UI present
  function initWhenReady(){
    const editor = document.getElementById('partite-editor');
    if(editor){ renderPartiteEditor(); return; }
    setTimeout(initWhenReady,200);
  }
  initWhenReady();
})();
</script>
